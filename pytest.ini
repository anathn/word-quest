[pytest]
# Set TESTING environment variable for all test runs
# This allows ProfileManager to accept temporary file paths for unit tests
env =
    TESTING=1

# Test discovery options
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution options
# IMPORTANT: pygame segfaults when running many tests serially.
# pytest-xdist is required for parallel execution to avoid crashes.
# Use SDL dummy drivers with xdist for reliable headless testing.
addopts = -v --tb=short -n auto --dist=loadfile
