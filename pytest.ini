[pytest]
# Set TESTING environment variable for all test runs
# This allows ProfileManager to accept temporary file paths for unit tests
env =
    TESTING=1

# Test discovery options
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution options
# Use pytest-xdist for parallel execution (fixes pygame segfault in large test suites)
# -n auto = auto-detect number of workers based on CPU count
# --reruns=2: Retry failing tests up to 2 times to handle flaky parallel tests
addopts = -v --tb=short -n auto --reruns=2