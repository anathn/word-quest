name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with parallel execution
        # Using pytest-xdist for parallel execution (-n auto) to avoid pygame segfaults
        # Note: --reruns removed due to segfault issues with pygame
        run: |
          SDL_VIDEODRIVER=dummy TESTING=1 pytest tests/ -v --cov=src --cov-report=term-missing -n auto

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
            **/test_*.py
